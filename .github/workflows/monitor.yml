name: APRUE Clim Quota Monitor

"on":
  schedule:
    # كل 15 دقيقة - GitHub يستخدم توقيت UTC، وقد يتأخر التنفيذ بضع دقائق
    # في أوقات الضغط العالي على خوادم GitHub (هذا سلوك طبيعي متوقع).
    - cron: "*/15 * * * *"
  workflow_dispatch: {}   # يسمح بتشغيل يدوي من تبويب Actions للاختبار

permissions:
  contents: write   # مطلوبة عشان نقدر نحفظ (نعمل commit) لملف state.json

concurrency:
  group: aprue-clim-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install --no-cache-dir requests

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python monitor.py

      - name: Commit updated state (if changed)
        run: |
          git config user.name "aprue-monitor-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          if ! git diff --cached --quiet; then
            git commit -m "update state [skip ci]"
            git fetch origin main
            git rebase origin/main
            git push
          else
            echo "No state change, skipping commit."
          fi
